<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spice Hub | DineDelight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="restaurant-detail.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <img src="/images/Restaurant-images/Dine-Delight-logo.png" alt="DineDelight Logo" class="logo-img" />
    </div>
    <nav class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="#">Events</a>
      <a href="#restaurants">Restaurants</a>
      <a href="#">Offers</a>
    </nav>
    <div class="nav-right">
      <button class="login-btn">Login / Signup</button>
    </div>
  </header>

  <section class="restaurant-hero" id="restaurant-detail"></section>

  <section class="menu-section">
    <h2>Menu Picks</h2>
    <div class="menu-grid" id="menu"></div>
  </section>

  <section class="reviews">
    <h2>Customer Reviews</h2>
    <div class="review-grid">
      <div class="review-card">
        <div class="review-stars">
          <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
        </div>
        <p>Best food quality and fast service.</p>
        <small>- Rahul</small>
      </div>
      <div class="review-card">
        <div class="review-stars">
          <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
        </div>
        <p>Affordable and tasty dishes.</p>
        <small>- Anjali</small>
      </div>
      <div class="review-card">
        <div class="review-stars">
          <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
        </div>
        <p>Highly recommended for families.</p>
        <small>- Aman</small>
      </div>
    </div>
  </section>

  <section class="gallery">
    <h2>Food &amp; Ambience Gallery</h2>
    <div class="gallery-grid">
      <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=900&q=80" alt="Restaurant interior" />
      <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=900&q=80" alt="Warm dining table setup" />
      <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=900&q=80" alt="Fine plated dish" />
      <img src="https://images.unsplash.com/photo-1424847651672-bf20a4b0982b?auto=format&fit=crop&w=900&q=80" alt="Chef serving food" />
      <img src="https://images.unsplash.com/photo-1466978913421-dad2ebd01d17?auto=format&fit=crop&w=900&q=80" alt="Restaurant ambience" />
      <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=900&q=80" alt="Food and drinks setup" />
      <img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?auto=format&fit=crop&w=900&q=80" alt="Dessert spread" />
      <img src="https://images.unsplash.com/photo-1559329007-40df8a9345d8?auto=format&fit=crop&w=900&q=80" alt="Outdoor restaurant space" />
    </div>
  </section>

  <footer class="footer">
    &copy; 2026 DineDelight. All rights reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>
